<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fish Food</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; }
    #orientation-prompt {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #000; color: #fff; z-index: 1000;
      justify-content: center; align-items: center;
      flex-direction: column; font-family: sans-serif; text-align: center;
    }
    #orientation-prompt .icon { font-size: 48px; margin-bottom: 16px; }
    #orientation-prompt .msg { font-size: 18px; }
    @media (orientation: portrait) and (max-width: 900px) {
      #orientation-prompt { display: flex; }
      canvas { display: none; }
    }
  </style>
</head>
<body>
  <div id="orientation-prompt">
    <div class="icon">📱↔️</div>
    <div class="msg">Please rotate your device to landscape mode</div>
  </div>
  <canvas id="game-canvas"></canvas>
  <script type="module" src="src/main.js"></script>
</body>
</html>
